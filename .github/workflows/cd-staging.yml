name: CD Staging

on:
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build:
    name: Build & Push image → GHCR
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.build
          push: true
          tags: ghcr.io/raspy737/cesizen-vue:staging
          build-args: |
            VITE_API_URL=${{ secrets.VITE_API_URL_STAGING }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Rendre le package public
        run: |
          gh api /user/packages/container/cesizen-vue \
            --method PATCH \
            --field visibility=public 2>/dev/null || true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  deploy:
    name: Deploy → Staging (Clever Cloud)
    runs-on: ubuntu-latest
    needs: build
    environment: staging

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configurer la clé SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.CLEVER_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H push-n3-par-clevercloud-customers.services.clever-cloud.com >> ~/.ssh/known_hosts

      - name: Deploy to Clever Cloud (staging)
        run: |
          git remote add clever "${{ secrets.CLEVER_REMOTE_STAGING }}"
          git push clever HEAD:master --force
