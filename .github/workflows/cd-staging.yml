name: CD Staging

on:
  workflow_dispatch:

jobs:
  deploy-staging:
    name: Deploy → Staging (Clever Cloud)
    runs-on: ubuntu-latest
    environment: staging

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Deploy to Clever Cloud (staging)
        run: |
          git remote add clever "${{ secrets.CLEVER_REMOTE_STAGING }}"
          git push clever HEAD:master --force
