name: CD Staging

on:
  workflow_dispatch:

jobs:
  deploy-staging:
    name: Deploy → Staging (Clever Cloud)
    runs-on: ubuntu-latest
    environment: staging

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL_STAGING }}

      - name: Deploy to Clever Cloud (staging)
        uses: 47ng/actions-clever-cloud@v2
        with:
          appID: ${{ secrets.CLEVER_APP_ID_STAGING }}
        env:
          CLEVER_TOKEN: ${{ secrets.CLEVER_TOKEN }}
          CLEVER_SECRET: ${{ secrets.CLEVER_SECRET }}
