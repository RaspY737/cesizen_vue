name: CD Staging

on:
  workflow_dispatch:

jobs:
  deploy-staging:
    name: Deploy → Staging (Clever Cloud)
    runs-on: ubuntu-latest
    environment: staging

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configurer la clé SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.CLEVER_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H push-n3-par-clevercloud-customers.services.clever-cloud.com >> ~/.ssh/known_hosts

      - name: Deploy to Clever Cloud (staging)
        run: |
          git remote add clever "${{ secrets.CLEVER_REMOTE_STAGING }}"
          git push clever HEAD:master --force
