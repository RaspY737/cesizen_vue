name: CD Production

on:
  workflow_dispatch:

permissions:
  contents: write
  packages: write

jobs:
  build:
    name: Build & Push image → GHCR
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/raspy737/cesizen-vue:latest
            ghcr.io/raspy737/cesizen-vue:${{ github.sha }}
          build-args: |
            VITE_API_URL=${{ secrets.VITE_API_URL_PROD }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy → Production (Clever Cloud)
    runs-on: ubuntu-latest
    needs: build
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configurer la clé SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.CLEVER_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H push-n3-par-clevercloud-customers.services.clever-cloud.com >> ~/.ssh/known_hosts

      - name: Deploy to Clever Cloud (production)
        run: |
          git remote add clever "${{ secrets.CLEVER_REMOTE_PROD }}"
          git push clever HEAD:master --force

      - name: Créer le tag de release
        run: |
          VERSION=$(node -p "require('./package.json').version")
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "v$VERSION" -m "Release v$VERSION" || echo "Tag déjà existant"
          git push origin "v$VERSION" || true
