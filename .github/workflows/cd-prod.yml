name: CD Production

on:
  workflow_dispatch:

jobs:
  deploy-prod:
    name: Deploy → Production (Clever Cloud)
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Deploy to Clever Cloud (production)
        run: |
          git remote add clever "${{ secrets.CLEVER_REMOTE_PROD }}"
          git push clever HEAD:master --force

      - name: Créer le tag de release
        run: |
          VERSION=$(node -p "require('./package.json').version")
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "v$VERSION" -m "Release v$VERSION" || echo "Tag déjà existant, on continue"
          git push origin "v$VERSION" || true
